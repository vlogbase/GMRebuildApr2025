<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access Denied</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">Access Denied</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger">
                            <h5 class="alert-heading">You do not have permission to access the admin area</h5>
                            <p>Only authorized administrators can access this section.</p>
                            <hr>
                            <p class="mb-0">If you believe you should have access, please contact the system administrator.</p>
                        </div>
                        
                        <div class="mt-4">
                            <a href="/" class="btn btn-primary">Return to Home</a>
                            <a href="/admin_blueprint/check" class="btn btn-outline-secondary ml-2">Check Access</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
