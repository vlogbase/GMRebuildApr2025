{% extends 'admin/base.html' %}

{% block head_css %}
    {{ super() }}
    <style>
        .admin-dashboard .jumbotron {
            background-color: #f8f9fa;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 0.3rem;
        }
        
        .admin-dashboard .panel {
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: 0 1px 1px rgba(0,0,0,.05);
        }
        
        .admin-dashboard .panel-heading {
            padding: 10px 15px;
            border-bottom: 1px solid transparent;
            border-top-left-radius: 3px;
            border-top-right-radius: 3px;
        }
        
        .admin-dashboard .panel-title {
            margin-top: 0;
            margin-bottom: 0;
            font-size: 16px;
            color: inherit;
        }
        
        .admin-dashboard .panel-body {
            padding: 15px;
        }
        
        .admin-dashboard .panel-primary {
            border-color: #337ab7;
        }
        
        .admin-dashboard .panel-primary > .panel-heading {
            color: #fff;
            background-color: #337ab7;
            border-color: #337ab7;
        }
        
        .admin-dashboard .panel-info {
            border-color: #5bc0de;
        }
        
        .admin-dashboard .panel-info > .panel-heading {
            color: #fff;
            background-color: #5bc0de;
            border-color: #5bc0de;
        }
        
        .admin-dashboard .panel-success {
            border-color: #5cb85c;
        }
        
        .admin-dashboard .panel-success > .panel-heading {
            color: #fff;
            background-color: #5cb85c;
            border-color: #5cb85c;
        }
        
        .admin-dashboard .btn {
            margin: 5px 0;
            display: inline-block;
        }
    </style>
{% endblock %}

{% block access_control %}
{% if current_user.is_authenticated %}
<div class="navbar-text btn-group pull-right">
    <a href="#" class="dropdown-toggle" data-toggle="dropdown" role="button" aria-expanded="false">
        <i class="glyphicon glyphicon-user"></i>
        {{ current_user.email }}
        <span class="caret"></span>
    </a>
    <ul class="dropdown-menu" role="menu">
        <li><a href="{{ url_for('index') }}">Back to App</a></li>
        <li><a href="{{ url_for('logout') }}">Log out</a></li>
    </ul>
</div>
{% endif %}
{% endblock %}

{% block brand %}
<a class="navbar-brand" href="{{ url_for('admin.index') }}">GloriaMundo Admin</a>
{% endblock %}
