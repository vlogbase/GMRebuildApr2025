<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access Check - GloriaMundo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h1>GloriaMundo Admin</h1>
                <div>
                    <a href="/" class="btn btn-outline-light">Back to Site</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="alert alert-success">
            <h4 class="alert-heading">Admin Access Verification</h4>
            <p>You have successfully verified your admin access.</p>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h3 class="card-title">Admin Access Details</h3>
            </div>
            <div class="card-body">
                <p><strong>Your Email:</strong> {{ admin_email }}</p>
                <p><strong>Authorized Admin Emails:</strong> {{ admin_emails }}</p>
                
                <div class="mt-3">
                    <a href="/admin" class="btn btn-primary">Back to Dashboard</a>
                    <a href="/admin-direct" class="btn btn-secondary">Alternative Admin Route</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p>GloriaMundo Admin Dashboard &copy; {{ now.year }}</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
